<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Semeando Trocas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🌱 Cadastro de Produtor</h1>
        <p>Preencha seus dados para fazer parte da nossa rede.</p>
        
        <!-- BOTÕES DE ACESSIBILIDADE ADICIONADOS AQUI -->
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap;">
            <button id="botao-ler" style="background-color: #4CAF50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
                🔊 Ouvir a página
            </button>
            <button id="botao-parar" style="background-color: #f44336; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
                ⏹️ Parar
            </button>
            <button id="btn-dark-mode">🌙 Modo Escuro</button>
        </div>
    </header>

    <!-- ID 'conteudo-projeto' ADICIONADO AQUI -->
    <div id="conteudo-projeto" class="container container-cadastro">

        <aside class="area-cadastro area-cadastro-pagina">
            <h2>Dados Pessoais</h2>
            <form id="form-dados-pessoais">
                <div class="grupo-form">
                    <label for="nome-completo">Nome Completo / Razão Social:</label>
                    <input type="text" id="nome-completo" required placeholder="Ex: João da Silva">
                </div>

                <div class="grupo-form">
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" required placeholder="Ex: Ibiporã, Londrina, Cambé...">
                </div>

                <div class="grupo-form">
                    <label for="telefone">WhatsApp para contato:</label>
                    <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                </div>

                <button type="submit" class="btn-cadastrar mt-20">Finalizar Cadastro</button>
            </form>

            <div class="voltar-container">
                <a href="index.html" class="link-voltar">← Voltar para o início</a>
            </div>
        </aside>

    </div>

   <script src="script.js"></script>
</body>

</html>
